<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LuminaAI — AI Art Studio</title>
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d1a;
    --bg2: #12121f;
    --bg3: #1a1a2e;
    --card: #16162a;
    --border: #2a2a45;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --cyan: #06b6d4;
    --pink: #ec4899;
    --text: #f1f0ff;
    --muted: #6b7280;
    --success: #10b981;
    --radius: 16px;
    --radius-sm: 10px;
  }
  html, body {
    height: 100%; background: var(--bg);
    color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overscroll-behavior: none; overflow: hidden;
  }
  #app { height: 100dvh; display: flex; flex-direction: column; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px;
    background: linear-gradient(180deg, #0d0d1a 0%, transparent 100%);
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid transparent;
  }
  .header-logo { display: flex; align-items: center; gap: 8px; }
  .header-logo svg { width: 28px; height: 28px; }
  .header-logo span { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .icon-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
  .icon-btn:active { transform: scale(0.92); background: var(--border); }

  /* NAV */
  .nav {
    display: flex; align-items: center; justify-content: space-around;
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    flex-shrink: 0; position: relative; z-index: 50;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 16px; transition: all 0.2s; border-radius: 12px; }
  .nav-item svg { width: 22px; height: 22px; stroke: var(--muted); transition: stroke 0.2s; }
  .nav-item span { font-size: 11px; color: var(--muted); font-weight: 500; transition: color 0.2s; }
  .nav-item.active svg { stroke: var(--accent2); }
  .nav-item.active span { color: var(--accent2); }
  .nav-create { background: linear-gradient(135deg, var(--accent), var(--cyan)); border-radius: 50%; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(124,58,237,0.5); transition: all 0.2s; margin-top: -16px; border: 3px solid var(--bg2); }
  .nav-create:active { transform: scale(0.9); }
  .nav-create svg { width: 24px; height: 24px; stroke: white; }

  /* PAGES */
  .page { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 10px; }
  .page::-webkit-scrollbar { display: none; }

  /* HOME PAGE */
  .home-hero {
    margin: 16px; padding: 24px; border-radius: 20px;
    background: linear-gradient(135deg, #1e1040 0%, #0f1a30 100%);
    border: 1px solid rgba(124,58,237,0.3);
    position: relative; overflow: hidden;
  }
  .home-hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 70% 30%, rgba(168,85,247,0.15) 0%, transparent 60%);
  }
  .home-hero-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent2); margin-bottom: 10px; }
  .home-hero h1 { font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
  .home-hero h1 span { background: linear-gradient(135deg, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .home-hero p { font-size: 14px; color: #9ca3af; margin-bottom: 18px; }
  .hero-btn { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--accent), var(--cyan)); color: white; border: none; padding: 12px 22px; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .hero-btn:active { transform: scale(0.96); }

  .section-title { font-size: 16px; font-weight: 700; margin: 20px 16px 12px; display: flex; align-items: center; gap: 6px; }

  /* FEED GRID */
  .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
  .feed-card { border-radius: var(--radius); overflow: hidden; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s; aspect-ratio: 3/4; position: relative; }
  .feed-card:active { transform: scale(0.97); }
  .feed-card img { width: 100%; height: 100%; object-fit: cover; }
  .feed-card-loading { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .feed-card-loading .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .feed-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 10px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
  .feed-card-info p { font-size: 11px; color: #e5e7eb; font-weight: 500; line-height: 1.3; }
  .feed-card-info .style-tag { display: inline-block; background: rgba(124,58,237,0.7); color: white; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; }

  /* CREATE PAGE */
  .create-page { padding: 16px; }
  .create-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .create-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  .prompt-box { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; transition: border-color 0.2s; }
  .prompt-box:focus-within { border-color: var(--accent); }
  .prompt-box textarea {
    width: 100%; background: none; border: none; outline: none; color: var(--text);
    font-size: 15px; line-height: 1.5; resize: none; min-height: 80px; font-family: inherit;
  }
  .prompt-box textarea::placeholder { color: var(--muted); }
  .prompt-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .prompt-hint { font-size: 12px; color: var(--muted); }
  .enhance-btn { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: var(--accent2); padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
  .enhance-btn:active { background: rgba(168,85,247,0.3); }
  .enhance-btn.loading { opacity: 0.6; }

  .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }

  /* STYLE GRID */
  .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .style-card {
    border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; cursor: pointer;
    background: var(--card); border: 2px solid var(--border); transition: all 0.2s;
  }
  .style-card:active { transform: scale(0.95); }
  .style-card.selected { border-color: var(--accent); background: rgba(124,58,237,0.1); }
  .style-card .emoji { font-size: 26px; display: block; margin-bottom: 6px; }
  .style-card .name { font-size: 12px; font-weight: 600; color: #d1d5db; }

  /* SIZE OPTIONS */
  .size-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .size-chip { padding: 8px 16px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .size-chip.selected { background: rgba(124,58,237,0.2); border-color: var(--accent); color: var(--accent2); }
  .size-chip:active { transform: scale(0.95); }

  /* GENERATE BUTTON */
  .gen-btn { width: 100%; padding: 16px; border-radius: var(--radius); background: linear-gradient(135deg, var(--accent), var(--cyan)); border: none; color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
  .gen-btn:active { transform: scale(0.98); opacity: 0.9; }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .gen-btn .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* RESULT */
  .result-box { border-radius: var(--radius); overflow: hidden; background: var(--card); border: 1px solid var(--border); margin-bottom: 20px; }
  .result-img { width: 100%; display: block; }
  .result-actions { display: flex; gap: 10px; padding: 14px; }
  .result-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .result-btn:active { transform: scale(0.95); }
  .result-btn.primary { background: linear-gradient(135deg, var(--accent), var(--cyan)); color: white; }
  .result-btn.secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }

  /* EFFECTS PAGE */
  .effects-page { padding: 16px; }
  .effects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .effect-card { border-radius: var(--radius-sm); overflow: hidden; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; aspect-ratio: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .effect-card:active { transform: scale(0.94); }
  .effect-card.selected { border-color: var(--accent); border-width: 2px; }
  .effect-card canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }
  .effect-card .effect-label { position: relative; z-index: 2; font-size: 11px; font-weight: 700; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.8); margin-top: auto; padding: 8px; }
  .effect-card .no-img { font-size: 24px; }
  .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px 20px; text-align: center; cursor: pointer; margin-bottom: 16px; transition: all 0.2s; }
  .upload-area:active { border-color: var(--accent); background: rgba(124,58,237,0.05); }
  .upload-area .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-area p { color: var(--muted); font-size: 14px; }
  .upload-area strong { color: var(--text); }
  .apply-effect-btn { width: 100%; padding: 15px; border-radius: var(--radius); background: linear-gradient(135deg, var(--pink), var(--accent)); border: none; color: white; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
  .apply-effect-btn:active { transform: scale(0.98); }
  .apply-effect-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .canvas-hidden { display: none; }

  /* GALLERY PAGE */
  .gallery-page { padding: 16px; }
  .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gallery-item { border-radius: var(--radius-sm); overflow: hidden; aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); position: relative; cursor: pointer; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
  .gallery-item .del-btn { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.6); border: none; color: white; width: 26px; height: 26px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 60px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }
  .empty-state strong { color: var(--text); display: block; font-size: 18px; margin-bottom: 6px; }

  /* EXPLORE PAGE */
  .explore-page { padding: 16px; }
  .explore-search { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 50px; padding: 12px 16px; margin-bottom: 20px; }
  .explore-search input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 15px; }
  .explore-search input::placeholder { color: var(--muted); }
  .explore-categories { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; }
  .explore-categories::-webkit-scrollbar { display: none; }
  .cat-chip { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .cat-chip.active { background: linear-gradient(135deg, var(--accent), var(--cyan)); border-color: transparent; color: white; }
  .explore-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .explore-card { border-radius: var(--radius-sm); overflow: hidden; background: var(--card); border: 1px solid var(--border); aspect-ratio: 1; position: relative; }
  .explore-card img { width: 100%; height: 100%; object-fit: cover; }
  .explore-card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 10px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); }
  .explore-card-overlay span { font-size: 11px; color: #e5e7eb; font-weight: 500; }

  /* PROFILE PAGE */
  .profile-page { padding: 16px; }
  .profile-hero { border-radius: 20px; background: linear-gradient(135deg, #1e1040, #0f1a30); border: 1px solid rgba(124,58,237,0.3); padding: 28px 20px; text-align: center; margin-bottom: 20px; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--cyan)); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 32px; }
  .profile-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .profile-bio { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
  .profile-stats { display: flex; justify-content: center; gap: 32px; }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; }
  .stat-label { font-size: 12px; color: var(--muted); }
  .profile-section { margin-bottom: 20px; }
  .profile-section-title { font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; cursor: pointer; }
  .setting-row:active { background: var(--bg3); }
  .setting-row-left { display: flex; align-items: center; gap: 12px; }
  .setting-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .setting-label { font-size: 15px; font-weight: 500; }
  .setting-right { color: var(--muted); font-size: 13px; }
  .toggle { width: 44px; height: 26px; border-radius: 13px; background: var(--border); position: relative; cursor: pointer; transition: background 0.2s; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
  .toggle.on::after { left: 21px; }

  /* TOAST */
  .toast-container { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; width: calc(100% - 32px); max-width: 380px; pointer-events: none; }
  .toast { background: #1e1e2e; border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: slideDown 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .toast.success { border-color: rgba(16,185,129,0.4); }
  .toast.error { border-color: rgba(239,68,68,0.4); }
  .toast.info { border-color: rgba(124,58,237,0.4); }

  /* IMAGE LIGHTBOX */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .lightbox img { max-width: 100%; max-height: 80vh; border-radius: 16px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .lightbox-actions { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; }
  .lb-btn { padding: 12px 24px; border-radius: 50px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .lb-btn.primary { background: linear-gradient(135deg, var(--accent), var(--cyan)); color: white; }
  .lb-btn.secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
  .lb-btn:active { transform: scale(0.95); }

  /* VOICE PAGE */
  .voice-page { padding: 16px; }
  .voice-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 16px; text-align: center; }
  .voice-btn { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), var(--accent)); border: none; color: white; font-size: 36px; cursor: pointer; margin: 16px auto; display: block; transition: all 0.2s; box-shadow: 0 4px 20px rgba(236,72,153,0.4); }
  .voice-btn:active { transform: scale(0.9); }
  .voice-btn.recording { animation: pulse 1.5s infinite; background: linear-gradient(135deg, #ef4444, #f97316); }
  .voice-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; color: var(--text); font-size: 15px; font-family: inherit; margin-bottom: 12px; outline: none; resize: none; }
  .voice-input:focus { border-color: var(--accent); }
  .speak-btn { width: 100%; padding: 15px; border-radius: var(--radius); background: linear-gradient(135deg, var(--pink), var(--accent)); border: none; color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .speak-btn:active { transform: scale(0.98); }
  .speak-btn:disabled { opacity: 0.4; }
  .voice-languages { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; }
  .voice-languages::-webkit-scrollbar { display: none; }
  .lang-chip { flex-shrink: 0; padding: 8px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .lang-chip.active { background: rgba(236,72,153,0.2); border-color: var(--pink); color: var(--pink); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { box-shadow: 0 4px 20px rgba(239,68,68,0.4); } 50% { box-shadow: 0 4px 40px rgba(239,68,68,0.8); transform: scale(1.05); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skeleton { background: linear-gradient(90deg, var(--card) 0%, var(--bg3) 50%, var(--card) 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }

  .badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #10b981; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
  .badge.free { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.3); color: var(--cyan); }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>
<div id="app">
  <!-- Toast container -->
  <div class="toast-container" id="toasts"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
        <path d="M14 2L16.5 9.5H24L18 14.5L20.5 22L14 17.5L7.5 22L10 14.5L4 9.5H11.5L14 2Z" fill="url(#lg1)"/>
      </svg>
      <span>LuminaAI</span>
    </div>
    <div class="header-right">
      <span class="badge free">✦ FREE</span>
    </div>
  </div>

  <!-- Page content -->
  <div class="page" id="page-content"></div>

  <!-- Bottom nav -->
  <nav class="nav">
    <div class="nav-item active" id="nav-home" onclick="setPage('home')">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      <span>Home</span>

function toast(msg, type = 'info', duration = 3500) {
  const container = document.getElementById('toasts');
  const icons = { success: '✅', error: '❌', info: '✦' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  container.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, duration);
}

function pollinationsUrl(prompt, w, h, seed) {
  const s = seed || Math.floor(Math.random() * 99999);
  const encoded = encodeURIComponent(prompt);
  return `https://image.pollinations.ai/prompt/${encoded}?width=${w}&height=${h}&seed=${s}&nologo=true`;
}

function downloadImage(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'lumina-ai.jpg';
  a.target = '_blank';
  a.click();
  toast('Saving image...', 'success');
}

async function enhancePrompt() {
  const ta = document.getElementById('prompt-input');
  const prompt = ta.value.trim();
  if (!prompt) { toast('Type a prompt first!', 'info'); return; }
  const btn = document.getElementById('enhance-btn');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const url = `https://text.pollinations.ai/${encodeURIComponent('Enhance this image generation prompt to be more detailed and vivid (return only the enhanced prompt, max 200 chars): ' + prompt)}`;
    const r = await fetch(url);
    const text = await r.text();
    if (text && text.length > 10) {
      ta.value = text.trim().substring(0, 498);
      document.getElementById('char-count').textContent = `${ta.value.length} / 500`;
      toast('Prompt enhanced! ✨', 'success');
    }
  } catch(e) { toast('Could not enhance, try again', 'error'); }
  btn.innerHTML = `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg> Enhance`;
  btn.disabled = false;
}

async function generateImage() {
  const ta = document.getElementById('prompt-input');
  const prompt = ta.value.trim();
  if (!prompt) { toast('Please enter a prompt!', 'info'); ta.focus(); return; }
  if (generating) return;
  generating = true;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> Generating...`;
  document.getElementById('result-area').innerHTML = `
    <div style="border-radius:16px;overflow:hidden;aspect-ratio:1;background:#16162a;border:1px solid #2a2a45;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;margin-bottom:20px;">
      <div class="spinner" style="width:36px;height:36px;border-width:4px;"></div>
      <p style="color:#9ca3af;font-size:14px;">Creating your image...</p>
      <p style="color:#6b7280;font-size:12px;">Powered by Pollinations.ai — free & unlimited</p>
    </div>`;

  const styleObj = STYLES.find(s => s.id === selectedStyle);
  const sizeObj = SIZES.find(s => s.id === selectedSize);
  const fullPrompt = `${prompt}, ${styleObj.prompt}`;
  const seed = Math.floor(Math.random() * 99999);
  const url = pollinationsUrl(fullPrompt, sizeObj.w, sizeObj.h, seed);

  const img = new Image();
  img.crossOrigin = 'anonymous';
  let retries = 0;
  const tryLoad = () => {
    img.src = url + `&t=${Date.now()}`;
  };
  img.onload = () => {
    lastGeneratedUrl = url;
    generating = false;
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg> Generate Again`;
    toast('Image generated! 🎨', 'success');
    // Save to gallery
    gallery.push({ url, prompt: prompt.substring(0,80), style: styleObj.name, ts: Date.now() });
    saveGallery();
    showResult(url, prompt);
  };
  img.onerror = () => {
    retries++;
    if (retries < 3) {
      setTimeout(tryLoad, 3000);
      document.getElementById('result-area').innerHTML = `
        <div style="border-radius:16px;aspect-ratio:1;background:#16162a;border:1px solid #2a2a45;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;margin-bottom:20px;padding:20px;text-align:center;">
          <div class="spinner" style="width:36px;height:36px;border-width:4px;"></div>
          <p style="color:#9ca3af;font-size:14px;">Retrying... (${retries}/3)</p>
          <p style="color:#6b7280;font-size:12px;">AI is generating your image, please wait...</p>
        </div>`;
    } else {
      generating = false;
      btn.disabled = false;
      btn.innerHTML = `<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg> Generate Image`;
      document.getElementById('result-area').innerHTML = `
        <div style="border-radius:16px;padding:24px;background:#1a0a0a;border:1px solid #4b1c1c;text-align:center;margin-bottom:20px;">
          <p style="font-size:32px;margin-bottom:12px;">😞</p>
          <p style="color:#f87171;font-size:15px;font-weight:600;margin-bottom:8px;">Generation failed</p>
          <p style="color:#9ca3af;font-size:13px;margin-bottom:16px;">The AI service may be busy. Try a different prompt or try again.</p>
          <button onclick="generateImage()" style="background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;color:white;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;">Try Again</button>
        </div>`;
      toast('Generation failed. Please try again.', 'error');
    }
  };
  tryLoad();
}

        ${effectsImage ? `
          <div style="border-radius:16px;overflow:hidden;margin-bottom:12px;position:relative;">
            <img id="effects-preview" src="${effectsImage}" style="width:100%;max-height:260px;object-fit:cover;border-radius:16px;filter:${selectedEffect ? EFFECTS.find(e=>e.id===selectedEffect)?.filter || 'none' : 'none'}">
          </div>
          <button onclick="clearEffectsImage()" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;">✕ Remove Image</button>
        ` : `
          <label class="upload-area" for="effects-file-input">
            <div class="upload-icon">📸</div>
            <strong>Upload a photo</strong>
            <p>Tap to pick from gallery</p>
            <input type="file" id="effects-file-input" accept="image/*" style="display:none" onchange="handleEffectsUpload(event)">
          </label>
        `}
      </div>

      <div class="section-label">🎨 Filter Effects</div>
      <div class="effects-grid" id="effects-grid">
        ${EFFECTS.map(e => `
          <div class="effect-card ${selectedEffect === e.id ? 'selected' : ''}" onclick="selectEffect('${e.id}')">
            ${effectsImage ? `<img src="${effectsImage}" style="width:100%;height:100%;object-fit:cover;filter:${e.filter || 'none'}">` : `<span class="no-img">${e.id === 'none' ? '🖼' : '🎨'}</span>`}
            <div class="effect-label">${e.name}</div>
          </div>
        `).join('')}
      </div>

      <button class="apply-effect-btn" onclick="applyEffect()" ${!effectsImage || !selectedEffect || selectedEffect === 'none' ? 'disabled' : ''}>
        ✨ Save with Effect
      </button>
    </div>`;
}

function clearEffectsImage() {
  effectsImage = null; selectedEffect = null; renderPage();
}

function handleEffectsUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    effectsImage = ev.target.result;
    renderPage();
    toast('Photo loaded! Choose an effect below.', 'success');
  };
  reader.readAsDataURL(file);
}

function selectEffect(id) {
  selectedEffect = id;
  // Update preview
  const preview = document.getElementById('effects-preview');
  if (preview) {
    const ef = EFFECTS.find(e => e.id === id);
    preview.style.filter = ef?.filter || 'none';
  }
  // Update grid selections
  document.querySelectorAll('.effect-card').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.effect-card').forEach(el => {
    if (el.getAttribute('onclick').includes(`'${id}'`)) el.classList.add('selected');
  });
  // Update apply button
  const btn = document.querySelector('.apply-effect-btn');
  if (btn) btn.disabled = !effectsImage || !selectedEffect || selectedEffect === 'none';
}

function applyEffect() {
  if (!effectsImage || !selectedEffect) return;
  const ef = EFFECTS.find(e => e.id === selectedEffect);
  if (!ef || !ef.filter) return;
  const src = document.getElementById('effect-source');
  const out = document.getElementById('effect-output');
  const img = new Image();
  img.onload = () => {
    src.width = img.width; src.height = img.height;
    out.width = img.width; out.height = img.height;
    const ctx = src.getContext('2d');
    ctx.filter = ef.filter;
    ctx.drawImage(img, 0, 0);
    out.getContext('2d').drawImage(src, 0, 0);
    const dataUrl = out.toDataURL('image/jpeg', 0.92);
    gallery.push({ url: dataUrl, prompt: `${ef.name} effect applied`, style: 'Effect', ts: Date.now() });
    saveGallery();
    const a = document.createElement('a');
    a.href = dataUrl; a.download = `lumina-${ef.name.toLowerCase()}.jpg`; a.click();
    toast(`${ef.name} effect saved to gallery! 🎨`, 'success');
  };
  img.src = effectsImage;
}

function useForEffects(url) {
  effectsImage = url;
  selectedEffect = null;
  setPage('effects');
}

        <input type="text" placeholder="Search styles, themes..." id="explore-search-input" onkeydown="if(event.key==='Enter')exploreSearch(this.value)">
      </div>
      <div class="explore-categories">
        ${EXPLORE_CATS.map(cat => `<div class="cat-chip ${exploreCat === cat.id ? 'active' : ''}" onclick="setExploreCat('${cat.id}')">${cat.label}</div>`).join('')}
      </div>
      <div class="explore-grid" id="explore-grid">
        ${prompts.map((p, i) => `
          <div class="explore-card" id="exp-${i}" onclick="openLightbox('${pollinationsUrl(p, 512, 512, 2000+i)}')">
            <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;" class="skeleton"></div>
          </div>
        `).join('')}
      </div>
    </div>`;
  // Load images
  prompts.forEach((p, i) => {
    const card = document.getElementById(`exp-${i}`);
    if (!card) return;
    const url = pollinationsUrl(p, 512, 512, 2000+i);
    const img = new Image();
    img.onload = () => {
      card.innerHTML = `
        <img src="${url}" alt="${p}" loading="lazy">
        <div class="explore-card-overlay"><span>${p}</span></div>
      `;
    };

    img.src = url;
  });
}

function setExploreCat(id) {
  exploreCat = id;
  renderExplore(document.getElementById('page-content'));
}

function exploreSearch(query) {
  if (!query.trim()) return;
  const c = document.getElementById('page-content');
  const prompts = [query, `${query} art`, `${query} detailed`, `${query} beautiful`, `${query} cinematic`];
  const grid = document.getElementById('explore-grid');
  if (!grid) return;
  grid.innerHTML = prompts.map((p, i) => `
    <div class="explore-card" id="es-${i}" onclick="openLightbox('${pollinationsUrl(p, 512, 512, 5000+i)}')">
      <div style="width:100%;height:100%;" class="skeleton"></div>
    </div>`).join('');
  prompts.forEach((p, i) => {
    const card = document.getElementById(`es-${i}`);
    if (!card) return;
    const url = pollinationsUrl(p, 512, 512, 5000+i);
    const img = new Image();
    img.onload = () => { card.innerHTML = `<img src="${url}" alt="${p}" loading="lazy"><div class="explore-card-overlay"><span>${p}</span></div>`; };
    img.onerror = () => { card.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;">🎨</div>`; };
    img.src = url;
  });
}

function deleteGallery(index) {

}

        </div>

      <div class="voice-card">

        <textarea class="voice-input" id="voice-text" rows="4" placeholder="Type anything here and AI will speak it in your chosen language...">${'Hello! I am LuminaAI, your personal AI art studio. I can generate amazing images for free!'}</textarea>
        <button class="speak-btn" id="speak-btn" onclick="speakText()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg>
          Speak Aloud

      </div>

      <div class="voice-card">
        <div style="font-size:14px;color:#9ca3af;margin-bottom:12px;">⚡ Quick phrases</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${[
            'Create a beautiful sunset painting',
            'Generate a futuristic robot portrait',
            'Make an anime character with blue eyes',
            'Draw a magical forest at night',
          ].map(p => `<button onclick="document.getElementById('voice-text').value='${p}'" style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);text-align:left;font-size:13px;cursor:pointer;">${p}</button>`).join('')}
        </div>
      </div>
      `}
    </div>`;
}

function speakText() {
  const text = document.getElementById('voice-text')?.value?.trim();
  if (!text) { toast('Enter some text first!', 'info'); return; }
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = selectedLang;
  utterance.rate = 0.95;
  utterance.pitch = 1.1;
  const btn = document.getElementById('speak-btn');
  if (btn) { btn.textContent = '🔊 Speaking...'; btn.disabled = true; }
  utterance.onend = () => {
    if (btn) { btn.innerHTML = `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg> Speak Aloud`; btn.disabled = false; }
  };
  utterance.onerror = () => {
    if (btn) { btn.textContent = 'Speak Aloud'; btn.disabled = false; }
    toast('Speech failed. Try a different browser.', 'error');
  };
  window.speechSynthesis.speak(utterance);
}

function openLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `
    <button class="lightbox-close" onclick="this.parentElement.remove()">✕</button>
    <img src="${url}" alt="AI Image">
    <div class="lightbox-actions">
      <button class="lb-btn primary" onclick="downloadImage('${url}')">⬇ Save Image</button>
      <button class="lb-btn secondary" onclick="useForEffects('${url}');this.closest('.lightbox').remove()">✨ Effects</button>
    </div>`;
  lb.addEventListener('click', (e) => { if (e.target === lb) lb.remove(); });
  document.body.appendChild(lb);
}
