<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LuminaAI – Free AI Studio</title>
<meta name="theme-color" content="#0f0f13">
<style>
:root {
  --bg1: #0f0f13;
  --bg2: #16161e;
  --bg3: #1e1e2a;
  --bg4: #252535;
  --accent: #7c3aed;
  --accent2: #a78bfa;
  --accent3: #c4b5fd;
  --green: #10b981;
  --red: #ef4444;
  --yellow: #f59e0b;
  --text: #f1f1f5;
  --muted: #9090a8;
  --border: #2a2a3a;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg1); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
#app { display:flex; flex-direction:column; height:100%; }
#page { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:80px; }
#page::-webkit-scrollbar { display:none; }

/* NAV */
#nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:var(--bg2); border-top:1px solid var(--border);
  display:flex; padding:8px 0 env(safe-area-inset-bottom,8px);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 4px; border:none; background:none; color:var(--muted);
  font-size:10px; font-weight:600; cursor:pointer; transition:all 0.2s;
  text-transform:uppercase; letter-spacing:0.5px;
}
.nav-btn.active { color:var(--accent2); }
.nav-btn svg { width:22px; height:22px; stroke-width:1.8; }
.nav-btn.active svg { stroke:var(--accent2); }

/* HEADER */
.page-header {
  padding:16px 16px 8px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { font-size:22px; font-weight:900; background:linear-gradient(135deg,#a78bfa,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* CARDS */
.card { background:var(--bg3); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; }

/* FEED */
.feed-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 12px 0; }
.feed-card { background:var(--bg3); border-radius:14px; overflow:hidden; border:1px solid var(--border); cursor:pointer; }
.feed-img-wrap { position:relative; aspect-ratio:3/4; overflow:hidden; background:var(--bg4); }
.feed-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity 0.3s; }
.feed-img-wrap img.loading { opacity:0; }
.feed-img-wrap .shimmer {
  position:absolute; inset:0;
  background:linear-gradient(90deg, var(--bg4) 0%, var(--bg3) 40%, var(--bg4) 80%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
}
.feed-img-wrap .shimmer.hidden { display:none; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.feed-label { padding:8px 10px; font-size:11px; font-weight:700; color:var(--text); }
.feed-tag { font-size:10px; color:var(--muted); margin-top:1px; }

/* SECTION TITLE */
.section-title { font-size:13px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; padding:16px 16px 8px; }

/* CREATE PAGE */
.create-page { padding:16px; }
.create-title { font-size:24px; font-weight:900; margin-bottom:4px; }
.create-sub { font-size:13px; color:var(--muted); margin-bottom:20px; }

/* Mode Tabs */
.mode-tabs { display:flex; background:var(--bg3); border-radius:12px; padding:4px; margin-bottom:20px; border:1px solid var(--border); }
.mode-tab { flex:1; padding:8px; text-align:center; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; border-radius:9px; transition:all 0.2s; }
.mode-tab.active { background:var(--accent); color:#fff; }

/* Textarea */
.prompt-wrap { position:relative; margin-bottom:12px; }
.prompt-input {
  width:100%; min-height:100px; padding:14px 44px 14px 14px;
  background:var(--bg3); border:1.5px solid var(--border); border-radius:14px;
  color:var(--text); font-size:14px; line-height:1.5; resize:none;
  outline:none; transition:border-color 0.2s;
}
.prompt-input:focus { border-color:var(--accent2); }
.prompt-input::placeholder { color:var(--muted); }
.clear-btn { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:4px; }

/* Style Chips */
.style-chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
.style-chips::-webkit-scrollbar { display:none; }
.style-chip {
  flex-shrink:0; padding:6px 14px; border-radius:50px;
  background:var(--bg3); border:1.5px solid var(--border);
  font-size:12px; font-weight:600; color:var(--muted); cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.style-chip.active { background:rgba(124,58,237,0.2); border-color:var(--accent2); color:var(--accent2); }

/* Size Picker */
.size-row { display:flex; gap:8px; margin-bottom:16px; }
.size-opt {
  flex:1; padding:10px 6px; background:var(--bg3); border:1.5px solid var(--border);
  border-radius:12px; cursor:pointer; text-align:center; transition:all 0.2s;
}
.size-opt.active { border-color:var(--accent2); background:rgba(124,58,237,0.1); }
.size-ico { font-size:18px; margin-bottom:2px; }
.size-lbl { font-size:10px; font-weight:700; color:var(--muted); }

/* Image Upload */
.img-upload {
  border:2px dashed var(--border); border-radius:14px;
  padding:24px; text-align:center; cursor:pointer;
  background:var(--bg3); margin-bottom:16px; transition:all 0.2s;
}
.img-upload:active { border-color:var(--accent2); background:rgba(124,58,237,0.05); }
.img-upload h4 { font-size:14px; margin:8px 0 4px; }
.img-upload p { font-size:12px; color:var(--muted); }
.img-preview-wrap { position:relative; margin-bottom:16px; }
.img-preview-wrap img { width:100%; border-radius:14px; border:2px solid var(--accent2); display:block; max-height:200px; object-fit:cover; }
.remove-img { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); border:none; border-radius:50%; width:28px; height:28px; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* Generate Button */
.gen-btn {
  width:100%; padding:16px; background:linear-gradient(135deg,#7c3aed,#5b21b6);
  border:none; border-radius:14px; color:#fff; font-size:16px; font-weight:800;
  cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(124,58,237,0.4);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.gen-btn:disabled { opacity:0.6; cursor:not-allowed; }
.gen-btn:not(:disabled):active { transform:scale(0.97); }

/* Result */
.result-area { margin-top:20px; }
.result-card { background:var(--bg3); border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
.result-img-container { position:relative; background:var(--bg4); min-height:300px; display:flex; align-items:center; justify-content:center; }
.result-img-container img { width:100%; display:block; max-height:500px; object-fit:contain; }
.result-img-container .img-loader {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; background:var(--bg4);
}
.result-img-container .img-loader.hidden { display:none; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent2); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { font-size:14px; font-weight:600; color:var(--accent2); text-align:center; padding:0 20px; }
.loader-sub { font-size:12px; color:var(--muted); text-align:center; padding:0 20px; }
.result-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px; }
.act-btn { padding:10px; background:var(--bg4); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:12px; font-weight:700; cursor:pointer; text-align:center; transition:all 0.2s; }
.act-btn:active { transform:scale(0.95); }
.act-btn.primary { background:rgba(124,58,237,0.2); border-color:var(--accent2); color:var(--accent2); }
.prompt-used { padding:12px; background:var(--bg4); border-top:1px solid var(--border); font-size:12px; color:var(--muted); line-height:1.5; }
.fail-state { text-align:center; padding:30px 20px; }
.fail-state .fail-ico { font-size:40px; margin-bottom:12px; }
.fail-state h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
.fail-state p { font-size:13px; color:var(--muted); margin-bottom:16px; }

/* EFFECTS */
.effects-page { padding:16px; }
.effects-upload {
  border:2px dashed var(--border); border-radius:var(--radius);
  padding:40px 20px; text-align:center; cursor:pointer;
  background:var(--bg3); margin-bottom:20px; transition:all 0.2s;
}
.effects-upload:active { border-color:var(--accent2); }
.eff-ico { font-size:48px; margin-bottom:12px; }
.effects-upload h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
.effects-upload p { font-size:13px; color:var(--muted); }
.canvas-wrap { position:relative; margin-bottom:16px; }
.canvas-wrap canvas { width:100%; border-radius:var(--radius); border:2px solid var(--border); display:block; }
.change-photo { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.7); border:1px solid var(--border); border-radius:10px; padding:6px 12px; color:#fff; font-size:12px; font-weight:700; cursor:pointer; }
.fx-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.fx-btn {
  padding:10px 6px; background:var(--bg3); border:1.5px solid var(--border);
  border-radius:12px; cursor:pointer; text-align:center; transition:all 0.2s;
}
.fx-btn.active { border-color:var(--accent2); background:rgba(124,58,237,0.15); }
.fx-btn.active .fx-name { color:var(--accent2); }
.fx-ico { font-size:20px; margin-bottom:3px; }
.fx-name { font-size:10px; font-weight:700; color:var(--muted); }
.save-fx-btn { width:100%; padding:14px; background:linear-gradient(135deg,#7c3aed,#5b21b6); border:none; border-radius:14px; color:#fff; font-size:14px; font-weight:800; cursor:pointer; }

/* VOICE */
.voice-page { padding:16px; }
.voice-input-wrap { margin-bottom:16px; }
.voice-textarea { width:100%; min-height:120px; padding:14px; background:var(--bg3); border:1.5px solid var(--border); border-radius:14px; color:var(--text); font-size:14px; line-height:1.6; resize:none; outline:none; }
.voice-textarea:focus { border-color:var(--accent2); }
.voice-controls { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
.ctrl-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.ctrl-row:last-child { margin-bottom:0; }
.ctrl-label { font-size:13px; font-weight:600; color:var(--muted); }
.ctrl-val { font-size:13px; font-weight:700; color:var(--accent2); min-width:40px; text-align:right; }
.voice-slider { width:100%; accent-color:var(--accent2); cursor:pointer; }
.lang-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:16px; }
.lang-btn { padding:10px; background:var(--bg3); border:1.5px solid var(--border); border-radius:12px; cursor:pointer; text-align:center; font-size:12px; font-weight:600; color:var(--muted); transition:all 0.2s; }
.lang-btn.active { border-color:var(--accent2); color:var(--accent2); background:rgba(124,58,237,0.1); }
.speak-btn { width:100%; padding:16px; background:linear-gradient(135deg,#059669,#047857); border:none; border-radius:14px; color:#fff; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 4px 20px rgba(5,150,105,0.4); display:flex; align-items:center; justify-content:center; gap:8px; }
.speak-btn.speaking { background:linear-gradient(135deg,#ef4444,#dc2626); box-shadow:0 4px 20px rgba(239,68,68,0.4); }

/* EXPLORE */
.explore-page { padding:12px; }
.search-wrap { position:relative; margin-bottom:16px; }
.search-input { width:100%; padding:12px 16px 12px 42px; background:var(--bg3); border:1.5px solid var(--border); border-radius:50px; color:var(--text); font-size:14px; outline:none; }
.search-input:focus { border-color:var(--accent2); }
.search-ico { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; }
.cat-chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
.cat-chips::-webkit-scrollbar { display:none; }
.cat-chip {
  flex-shrink:0; padding:7px 14px; border-radius:50px;
  background:var(--bg3); border:1.5px solid var(--border);
  font-size:12px; font-weight:600; color:var(--muted); cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.cat-chip.active { background:rgba(124,58,237,0.2); border-color:var(--accent2); color:var(--accent2); }
.explore-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.explore-card { background:var(--bg3); border-radius:14px; overflow:hidden; border:1px solid var(--border); }
.explore-img { position:relative; aspect-ratio:1/1; background:var(--bg4); overflow:hidden; }
.explore-img img { width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity 0.5s; }
.explore-img img.loaded { opacity:1; }
.explore-img .shimmer { position:absolute; inset:0; background:linear-gradient(90deg,var(--bg4) 0%,var(--bg3) 40%,var(--bg4) 80%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
.explore-info { padding:8px 10px; }
.explore-title { font-size:11px; font-weight:700; margin-bottom:2px; }
.explore-style { font-size:10px; color:var(--muted); }

/* GALLERY */
.gallery-page { padding:16px; }
.gallery-empty { text-align:center; padding:60px 20px; }
.gallery-empty .empty-ico { font-size:64px; margin-bottom:16px; }
.gallery-empty h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
.gallery-empty p { font-size:13px; color:var(--muted); }
.gallery-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.gallery-item { position:relative; background:var(--bg3); border-radius:14px; overflow:hidden; border:1px solid var(--border); }
.gallery-item img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; cursor:pointer; }
.gallery-item .del-btn { position:absolute; top:6px; right:6px; background:rgba(0,0,0,0.7); border:none; border-radius:8px; padding:4px 8px; color:#fff; font-size:11px; cursor:pointer; font-weight:700; }
.gallery-item .g-label { padding:8px; font-size:10px; font-weight:700; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gallery-stats { display:flex; gap:12px; margin-bottom:20px; }
.g-stat { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center; }
.g-stat-num { font-size:24px; font-weight:900; color:var(--accent2); }
.g-stat-lbl { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }

/* LIGHTBOX */
#lightbox {
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(0,0,0,0.95); align-items:center; justify-content:center;
  flex-direction:column;
}
#lightbox.open { display:flex; }
#lightbox img { max-width:95vw; max-height:80vh; object-fit:contain; border-radius:12px; }
#lightbox-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.15); border:none; border-radius:50%; width:36px; height:36px; color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#lightbox-actions { display:flex; gap:12px; margin-top:16px; }
#lightbox-actions button { padding:10px 20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:10px; color:#fff; font-size:13px; font-weight:700; cursor:pointer; }

/* TOAST */
#toast-container { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
.toast { padding:10px 20px; border-radius:50px; font-size:13px; font-weight:700; opacity:0; transform:translateY(-20px); transition:all 0.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.success { background:#059669; color:#fff; }
.toast.error { background:#ef4444; color:#fff; }
.toast.info { background:#3b82f6; color:#fff; }

/* Scrollable chips */
.scroll-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.scroll-row::-webkit-scrollbar { display:none; }

/* Badges */
.badge-free { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); border-radius:50px; font-size:10px; font-weight:700; color:#10b981; }

/* Progress bar */
.progress-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:8px; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; width:0%; transition:width 0.5s; }

/* Counter for loading */
.loading-counter { font-size:28px; font-weight:900; color:var(--accent2); }
</style>
</head>
<body>
<div id="app">
  <div id="page"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="navigate('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Feed
    </button>
    <button class="nav-btn" onclick="navigate('create')" id="nav-create">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Create
    </button>
    <button class="nav-btn" onclick="navigate('effects')" id="nav-effects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Effects
    </button>
    <button class="nav-btn" onclick="navigate('explore')" id="nav-explore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Explore
    </button>
    <button class="nav-btn" onclick="navigate('gallery')" id="nav-gallery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Gallery
    </button>
  </nav>
</div>
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-actions">
    <button onclick="downloadFromLightbox()">⬇ Save</button>
    <button onclick="shareFromLightbox()">📤 Share</button>
  </div>
</div>
<div id="toast-container"></div>

<script>
// ===== STATE =====
let gallery = JSON.parse(localStorage.getItem('lumina_gallery') || '[]');
let currentPage = 'home';
let effectsImageData = null;
let effectsCtx = null;
let currentStyle = 'realistic';
let currentSize = 'square';
let currentLang = 'en-US';
let voiceRate = 1.0;
let voicePitch = 1.0;
let currentEffect = 'none';
let inputImage = null;
let currentMode = 'text'; // 'text' or 'image'
let currentLightboxUrl = '';
let exploreCategory = 'trending';
let voices = [];
let isSpeaking = false;

const STYLES = [
  {id:'realistic', name:'Realistic', emoji:'📸'},
  {id:'anime', name:'Anime', emoji:'🌸'},
  {id:'oil', name:'Oil Paint', emoji:'🎨'},
  {id:'sketch', name:'Sketch', emoji:'✏️'},
  {id:'neon', name:'Neon', emoji:'💜'},
  {id:'watercolor', name:'Watercolor', emoji:'💧'},
  {id:'3d', name:'3D Render', emoji:'🎲'},
  {id:'pixel', name:'Pixel Art', emoji:'👾'},
  {id:'vintage', name:'Vintage', emoji:'📷'},
  {id:'dark', name:'Dark Fantasy', emoji:'🔮'},
];

const SIZES = {
  square: {w:512, h:512, label:'Square', ico:'⬛'},
  portrait: {w:512, h:768, label:'Portrait', ico:'📱'},
  landscape: {w:768, h:512, label:'Wide', ico:'🖥'},
};

const EFFECTS = [
  {id:'none', name:'Original', ico:'📷'},
  {id:'vivid', name:'Vivid', ico:'🌈'},
  {id:'bw', name:'B&W', ico:'⚫'},
  {id:'sepia', name:'Sepia', ico:'🟤'},
  {id:'blur', name:'Blur', ico:'🌫'},
  {id:'sharp', name:'Sharpen', ico:'🔪'},
  {id:'warm', name:'Warm', ico:'🔥'},
  {id:'cool', name:'Cool', ico:'🧊'},
  {id:'vintage', name:'Vintage', ico:'📸'},
  {id:'dramatic', name:'Drama', ico:'🎭'},

// ===== UTILS =====
function pUrl(prompt, w, h, seed) {
  const s = seed || Math.floor(Math.random() * 999999);
  const enc = encodeURIComponent(prompt.trim().substring(0, 200));
  return `https://image.pollinations.ai/prompt/${enc}?width=${w}&height=${h}&seed=${s}&nologo=true`;
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  renderPage(page);
}

function renderPage(page) {
  const p = document.getElementById('page');
  if (page === 'home') renderHome(p);
  else if (page === 'create') renderCreate(p);
  else if (page === 'effects') renderEffects(p);
  else if (page === 'explore') renderExplore(p);
  else if (page === 'gallery') renderGallery(p);
}

// ===== GALLERY =====
function saveGallery() { localStorage.setItem('lumina_gallery', JSON.stringify(gallery)); }
function addToGallery(url, prompt, style) {
  const exists = gallery.some(g => g.url === url);
  if (!exists) {
    gallery.unshift({url, prompt, style, date: new Date().toLocaleDateString()});
    if (gallery.length > 50) gallery.pop();
    saveGallery();
    toast('Saved to Gallery! 🖼', 'success');
  }
}

async function enhancePrompt() {
  const ta = document.getElementById('create-prompt');
  if (!ta) return;
  const original = ta.value.trim();
  if (!original) { toast('Enter a prompt first!', 'info'); return; }
  toast('✨ Enhancing prompt...', 'info');
  try {
    const enhPrompt = `Enhance this image generation prompt to be more detailed and vivid (max 50 words, return only the enhanced prompt): "${original}"`;
    const url = `https://text.pollinations.ai/${encodeURIComponent(enhPrompt)}`;
    const res = await fetch(url);
    if (res.ok) {
      const enhanced = await res.text();
      ta.value = enhanced.trim().replace(/^["']|["']$/g, '');
      toast('Prompt enhanced! ✨', 'success');
    } else throw new Error();
  } catch(e) {
    toast('Enhancement unavailable', 'error');
  }
}

// ===== BULLETPROOF IMAGE GENERATION =====
function generateImage() {
  const prompt = document.getElementById('create-prompt')?.value?.trim();
  if (!prompt) { toast('Please enter a prompt!', 'info'); return; }

  const btn = document.getElementById('gen-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Generating...'; }

  const styleObj = STYLES.find(s => s.id === currentStyle) || STYLES[0];
  const sz = SIZES[currentSize];
  const stylePrompt = currentMode === 'image' && inputImage
    ? `${prompt}, transform in style of ${styleObj.name} art, ${styleObj.id} style`
    : `${prompt}, ${styleObj.id} style, high quality, detailed`;

  const seed = Math.floor(Math.random() * 999999);
  const imgUrl = pUrl(stylePrompt, sz.w, sz.h, seed);

  const resultArea = document.getElementById('result-area');
  if (!resultArea) return;

  // Show loading state with timer
  let elapsed = 0;
  const timer = setInterval(() => {
    elapsed++;
    const counter = document.getElementById('load-counter');
    const bar = document.getElementById('load-bar');
    if (counter) counter.textContent = elapsed + 's';
    if (bar) bar.style.width = Math.min(elapsed * 3.3, 95) + '%';
    if (elapsed > 60) {
      const subtext = document.getElementById('load-sub');
      if (subtext) subtext.textContent = 'Almost there... 🎨';
    }
  }, 1000);

  resultArea.innerHTML = `
    <div class="result-card">
      <div class="result-img-container" id="result-img-container">
        <div class="img-loader" id="img-loader">
          <div class="spinner"></div>
          <div class="loader-text">Creating your image...</div>
          <div id="load-counter" class="loading-counter">0s</div>
          <div id="load-sub" class="loader-sub">Pollinations.AI is working its magic ✨<br>This takes 15–30 seconds</div>
          <div class="progress-bar" style="width:200px">
            <div class="progress-fill" id="load-bar"></div>
          </div>
        </div>
        <img id="gen-img" src="${imgUrl}" alt="${prompt}"
          style="display:none"
          onload="onImageLoaded('${imgUrl}','${prompt.replace(/'/g, "\\'")}','${styleObj.name}')"
          onerror="onImageError('${prompt.replace(/'/g, "\\'")}','${styleObj.name}',${seed})">
      </div>
    </div>`;

  // Timeout: if 90s pass and still loading, show manual retry
  setTimeout(() => {
    clearInterval(timer);
    const loader = document.getElementById('img-loader');
    if (loader && !loader.classList.contains('hidden')) {
      loader.innerHTML = `
        <div class="fail-state">
          <div class="fail-ico">⏱</div>
          <h3>Taking too long</h3>
          <p>Pollinations is busy right now</p>
          <button class="gen-btn" style="max-width:200px" onclick="generateImage()">🔄 Try Again</button>
          <div style="margin-top:12px"><a href="${imgUrl}" target="_blank" style="font-size:12px;color:var(--accent2)">Open image directly →</a></div>
        </div>`;
      if (btn) { btn.disabled = false; btn.innerHTML = '✨ Generate Image'; }
    }
  }, 90000);

  // Store timer ref for cleanup
  window._genTimer = timer;
}

function onImageLoaded(url, prompt, styleName) {
  clearInterval(window._genTimer);
  const container = document.getElementById('result-img-container');
  const loader = document.getElementById('img-loader');
  const img = document.getElementById('gen-img');
  const btn = document.getElementById('gen-btn');

  if (loader) loader.classList.add('hidden');
  if (img) img.style.display = 'block';

  // Add actions below
  const resultArea = document.getElementById('result-area');
  if (resultArea) {
    const actionsDiv = document.createElement('div');
    actionsDiv.innerHTML = `
      <div class="result-actions">
        <button class="act-btn primary" onclick="addToGallery('${url}','${prompt.replace(/'/g,"\\'")}','${styleName}')">🖼 Save to Gallery</button>
        <button class="act-btn" onclick="downloadImage('${url}')">⬇ Download</button>
        <button class="act-btn" onclick="shareImage('${url}','${prompt.replace(/'/g,"\\'")}')">📤 Share</button>
        <button class="act-btn" onclick="generateImage()">🔄 Regenerate</button>
      </div>
      <div class="prompt-used">💬 <strong>Prompt:</strong> ${prompt}</div>`;
    resultArea.querySelector('.result-card')?.appendChild(actionsDiv);
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '✨ Generate Again'; }
  addToGallery(url, prompt, styleName);
  toast('Image created! 🎉', 'success');
}

function onImageError(prompt, styleName, originalSeed) {
  clearInterval(window._genTimer);
  const btn = document.getElementById('gen-btn');
  const sz = SIZES[currentSize];
  const styleObj = STYLES.find(s => s.id === currentStyle) || STYLES[0];
  const newSeed = originalSeed + Math.floor(Math.random() * 1000);
  const newUrl = pUrl(`${prompt}, ${styleObj.id} style, high quality`, sz.w, sz.h, newSeed);

  const loader = document.getElementById('img-loader');
  if (loader) {
    loader.innerHTML = `
      <div class="fail-state">
        <div class="fail-ico">🔄</div>
        <h3>Server Busy</h3>
        <p>Pollinations.AI is overloaded right now. Try again!</p>
        <button class="gen-btn" style="max-width:200px;margin-bottom:12px" onclick="generateImage()">🔄 Retry</button>
        <div><a href="${newUrl}" target="_blank" style="font-size:12px;color:var(--accent2)">Or open image directly →</a></div>
      </div>`;
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '✨ Try Again'; }
}

function applyEffect(effectId, reRender = true) {
  currentEffect = effectId;
  if (!effectsCtx || !effectsImageData) return;

  const canvas = effectsCtx.canvas;
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    effectsCtx.drawImage(img, 0, 0);
    const imageData = effectsCtx.getImageData(0, 0, canvas.width, canvas.height);
    const d = imageData.data;

    for (let i = 0; i < d.length; i += 4) {
      let r = d[i], g = d[i+1], b = d[i+2];
      switch (effectId) {
        case 'bw': { const gray=(r+g+b)/3; d[i]=d[i+1]=d[i+2]=gray; break; }
        case 'sepia': d[i]=Math.min(255,r*.393+g*.769+b*.189); d[i+1]=Math.min(255,r*.349+g*.686+b*.168); d[i+2]=Math.min(255,r*.272+g*.534+b*.131); break;
        case 'vivid': d[i]=Math.min(255,r*1.3); d[i+1]=Math.min(255,g*1.3); d[i+2]=Math.min(255,b*1.3); break;
        case 'warm': d[i]=Math.min(255,r*1.2); d[i+2]=Math.max(0,b*.8); break;
        case 'cool': d[i+2]=Math.min(255,b*1.3); d[i]=Math.max(0,r*.85); break;
        case 'vintage': { const gray=(r+g+b)/3; d[i]=Math.min(255,gray*.8+112*.2); d[i+1]=Math.min(255,gray*.8+66*.2); d[i+2]=Math.min(255,gray*.8+20*.2); break; }
        case 'dramatic': { const gray=(r+g+b)/3; const c=gray>128?1.5:.5; d[i]=Math.min(255,r*c); d[i+1]=Math.min(255,g*c); d[i+2]=Math.min(255,b*c); break; }
        case 'fade': d[i]=r*.7+255*.3; d[i+1]=g*.7+255*.3; d[i+2]=b*.7+255*.3; break;
        case 'neon': d[i]=Math.min(255,r+50); d[i+2]=Math.min(255,b+80); d[i+1]=Math.max(0,g-30); break;
        case 'invert': d[i]=255-r; d[i+1]=255-g; d[i+2]=255-b; break;
        case 'bright': d[i]=Math.min(255,r+50); d[i+1]=Math.min(255,g+50); d[i+2]=Math.min(255,b+50); break;
        case 'dark': d[i]=Math.max(0,r-60); d[i+1]=Math.max(0,g-60); d[i+2]=Math.max(0,b-60); break;
        case 'pink': d[i]=Math.min(255,r+40); d[i+2]=Math.min(255,b+30); d[i+1]=Math.max(0,g-20); break;
        case 'blur': { if(i>canvas.width*4 && i<d.length-canvas.width*4) { d[i]=(d[i-4]+d[i]+d[i+4])/3; d[i+1]=(d[i-3]+d[i+1]+d[i+5])/3; d[i+2]=(d[i-2]+d[i+2]+d[i+6])/3; } break; }
        case 'sharp': { const sh=d[i]*5-d[i-4]-d[i+4]-d[i-canvas.width*4]-d[i+canvas.width*4]; d[i]=Math.min(255,Math.max(0,sh)); break; }
      }
    }
    effectsCtx.putImageData(imageData, 0, 0);
    // Update fx buttons
    document.querySelectorAll('.fx-btn').forEach(btn => {
      const name = btn.querySelector('.fx-name')?.textContent;
      const fx = EFFECTS.find(f => f.name === name);
      btn.classList.toggle('active', fx?.id === effectId);
    });
  };
  img.src = effectsImageData;
}

function saveEffect() {
  const canvas = document.getElementById('effects-canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = 'lumina-effect-' + Date.now() + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  toast('Photo saved! ✅', 'success');
  addToGallery(canvas.toDataURL('image/png'), 'Photo Effect: ' + currentEffect, currentEffect);
}

// ===== VOICE =====
function renderVoice(c) {
  c.innerHTML = `
    <div class="voice-page">
      <div class="page-header" style="padding:0 0 16px">
        <div>
          <div class="create-title">🎙 Voice AI</div>
          <div class="create-sub">Convert any text to speech</div>
        </div>
        <span class="badge-free">🆓 Free</span>
      </div>

      <div class="voice-input-wrap">
        <textarea id="voice-text" class="voice-textarea"
          placeholder="Type anything to hear it spoken aloud...&#10;&#10;Supports 8 languages!"
          rows="5"></textarea>
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Language</div>
      <div class="lang-grid" style="margin-bottom:16px">
        ${LANGS.map(l => `<div class="lang-btn ${currentLang===l.code?'active':''}" onclick="selectLang('${l.code}')">${l.label}</div>`).join('')}
      </div>

      <div class="voice-controls">
        <div class="ctrl-row">
          <span class="ctrl-label">⚡ Speed</span>
          <input type="range" class="voice-slider" min="0.5" max="2" step="0.1" value="${voiceRate}"
            oninput="voiceRate=this.value;document.getElementById('rate-val').textContent=parseFloat(this.value).toFixed(1)+'x'">
          <span class="ctrl-val" id="rate-val">${voiceRate}x</span>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">🎵 Pitch</span>
          <input type="range" class="voice-slider" min="0.5" max="2" step="0.1" value="${voicePitch}"
            oninput="voicePitch=this.value;document.getElementById('pitch-val').textContent=parseFloat(this.value).toFixed(1)">
          <span class="ctrl-val" id="pitch-val">${voicePitch}</span>
        </div>
      </div>

      <button class="speak-btn ${isSpeaking?'speaking':''}" id="speak-btn" onclick="toggleSpeak()">
        ${isSpeaking ? '⏹ Stop Speaking' : '▶ Speak Now'}
      </button>

      <div style="margin-top:16px;padding:14px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Quick Phrases</div>
        <div class="scroll-row">
          ${['Hello World! 👋', 'Welcome to LuminaAI ✨', 'This is amazing! 🎉', 'AI is the future 🚀', 'Beautiful sunset 🌅'].map(p =>
            `<div class="style-chip" onclick="document.getElementById('voice-text').value='${p}'">${p}</div>`
          ).join('')}
        </div>
      </div>
    </div>`;
}

function selectLang(code) {
  currentLang = code;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(LANGS.find(l=>l.code===code)?.label.split(' ')[1]||''));
  });
}

function toggleSpeak() {
  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
    const btn = document.getElementById('speak-btn');
    if (btn) { btn.classList.remove('speaking'); btn.innerHTML = '▶ Speak Now'; }
    return;
  }
  const text = document.getElementById('voice-text')?.value?.trim();
  if (!text) { toast('Enter some text first!', 'info'); return; }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = currentLang;
  utter.rate = parseFloat(voiceRate);
  utter.pitch = parseFloat(voicePitch);
  utter.onstart = () => {
    isSpeaking = true;
    const btn = document.getElementById('speak-btn');
    if (btn) { btn.classList.add('speaking'); btn.innerHTML = '⏹ Stop Speaking'; }
  };
  utter.onend = utter.onerror = () => {
    isSpeaking = false;
    const btn = document.getElementById('speak-btn');
    if (btn) { btn.classList.remove('speaking'); btn.innerHTML = '▶ Speak Now'; }
  };
  speechSynthesis.speak(utter);
  toast('🎙 Speaking...', 'success');
}

// ===== EXPLORE =====
function renderExplore(c) {
  const prompts = EXPLORE_PROMPTS[exploreCategory] || EXPLORE_PROMPTS.trending;
  c.innerHTML = `
    <div class="explore-page">
      <div class="page-header" style="padding:0 0 12px">
        <div class="logo">🔭 Explore</div>
        <span class="badge-free">🆓 Free</span>
      </div>
      <div class="cat-chips">
        ${EXPLORE_CATS.map(cat => `<div class="cat-chip ${exploreCategory===cat.id?'active':''}" onclick="setCategory('${cat.id}')">${cat.label}</div>`).join('')}
      </div>
      <div class="explore-grid" id="explore-grid">
        ${prompts.map((p, i) => {
          const seed = 5000 + i + (exploreCategory.length * 100);
          const url = pUrl(p, 400, 400, seed);
          return `
          <div class="explore-card" onclick="openLightbox('${url}')">
            <div class="explore-img">
              <div class="shimmer" id="exp-sh-${i}"></div>
              <img src="${url}" loading="lazy"
                onload="this.classList.add('loaded');document.getElementById('exp-sh-${i}')?.remove()"
                onerror="this.src='${pUrl(p, 400, 400, seed+500)}'"
                alt="${p}">
            </div>
            <div class="explore-info">
              <div class="explore-title">${p.substring(0,28)}${p.length>28?'...':''}</div>
              <div class="explore-style">${EXPLORE_CATS.find(c=>c.id===exploreCategory)?.label||'AI Art'}</div>
            </div>
          </div>`}).join('')}
      </div>
    </div>`;
}

function setCategory(cat) {
  exploreCategory = cat;
  renderPage('explore');
}

  const count = gallery.length;
  c.innerHTML = `
    <div class="gallery-page">
      <div class="page-header" style="padding:0 0 16px">
        <div>
          <div class="create-title">🖼 My Gallery</div>
          <div class="create-sub">Your saved creations</div>
        </div>
        ${count > 0 ? `<button onclick="clearGallery()" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:6px 12px;color:#ef4444;font-size:11px;font-weight:700;cursor:pointer">Clear All</button>` : ''}
      </div>

      ${count > 0 ? `
        <div class="gallery-stats">
          <div class="g-stat"><div class="g-stat-num">${count}</div><div class="g-stat-lbl">Images</div></div>
          <div class="g-stat"><div class="g-stat-num">${new Set(gallery.map(g=>g.style)).size}</div><div class="g-stat-lbl">Styles</div></div>
          <div class="g-stat"><div class="g-stat-num">${gallery[0]?.date||'—'}</div><div class="g-stat-lbl">Latest</div></div>
        </div>
        <div class="gallery-grid">
          ${gallery.map((item, i) => `
            <div class="gallery-item">
              <img src="${item.url}" alt="${item.prompt}"
                loading="lazy"
                onclick="openLightbox('${item.url}')"
                onerror="this.style.display='none'">
              <button class="del-btn" onclick="deleteGallery(${i})">✕</button>
              <div class="g-label">${item.prompt?.substring(0,20)||'AI Image'}...</div>
            </div>
          `).join('')}
        </div>
      ` : `
        <div class="gallery-empty">
          <div class="empty-ico">🖼</div>
          <h3>No images yet</h3>
          <p>Generate images in the Create tab and save them to your gallery!</p>
          <button class="gen-btn" style="max-width:200px;margin:16px auto 0" onclick="navigate('create')">✨ Create Now</button>
        </div>
      `}
    </div>`;
}

function deleteGallery(i) {
  gallery.splice(i, 1);
  saveGallery();
  renderPage('gallery');
  toast('Removed from gallery', 'info');
}

function clearGallery() {
  if (confirm('Clear all saved images?')) {
    gallery = [];
    saveGallery();
    renderPage('gallery');
    toast('Gallery cleared', 'info');
  }
}

// ===== LIGHTBOX =====
function openLightbox(url) {
  currentLightboxUrl = url;
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function downloadFromLightbox() { downloadImage(currentLightboxUrl); }
function shareFromLightbox() { shareImage(currentLightboxUrl, 'LuminaAI creation'); }

// Override renderPage to include voice
const _origRenderPage = window.renderPage;
window.renderPage = function(page) {
  const p = document.getElementById('page');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  if (page === 'home') renderHome(p);
  else if (page === 'create') renderCreate(p);
  else if (page === 'effects') renderEffects(p);
  else if (page === 'voice') renderVoice(p);
  else if (page === 'explore') renderExplore(p);
  else if (page === 'gallery') renderGallery(p);
};
