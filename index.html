<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LuminaAI — AI Art Studio</title>
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a14;
  --bg2: #0f0f1c;
  --bg3: #161625;
  --card: #13132060;
  --border: #ffffff12;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --cyan: #06b6d4;
  --pink: #ec4899;
  --green: #10b981;
  --text: #f1f0ff;
  --muted: #6b7280;
  --radius: 18px;
  --radius-sm: 12px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; overflow: hidden; }
#app { height: 100dvh; display: flex; flex-direction: column; }

/* SHIMMER */
@keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
.shimmer { background: linear-gradient(90deg, var(--bg3) 25%, #1e1e35 50%, var(--bg3) 75%); background-size: 800px 100%; animation: shimmer 1.5s infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pop { 0%{transform:scale(0.85);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* HEADER */
.header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; flex-shrink:0; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { width:32px; height:32px; background:linear-gradient(135deg,#7c3aed,#06b6d4); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo-text { font-size:22px; font-weight:900; background:linear-gradient(135deg,#a855f7,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-0.5px; }
.header-badges { display:flex; gap:8px; align-items:center; }
.badge-free { background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(6,182,212,0.2)); border:1px solid rgba(16,185,129,0.4); color:#10b981; font-size:11px; font-weight:700; padding:5px 10px; border-radius:20px; letter-spacing:0.5px; }
.badge-notif { width:36px; height:36px; background:var(--bg3); border:1px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; }

/* NAV */
.nav { display:flex; align-items:center; justify-content:space-around; background:var(--bg2); border-top:1px solid var(--border); padding:8px 0 max(8px,env(safe-area-inset-bottom)); flex-shrink:0; backdrop-filter:blur(20px); }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:6px 14px; border-radius:14px; transition:all 0.2s; min-width:60px; }
.nav-item .nav-ico { font-size:22px; transition:transform 0.2s; }
.nav-item span { font-size:10px; color:var(--muted); font-weight:600; transition:color 0.2s; }
.nav-item.active .nav-ico { transform:scale(1.1); }
.nav-item.active span { color:var(--accent2); }
.nav-item.active { background:rgba(168,85,247,0.1); }
.nav-create { background:linear-gradient(135deg,var(--accent),var(--cyan)); border-radius:50%; width:54px; height:54px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 24px rgba(124,58,237,0.5); transition:all 0.2s; margin-top:-18px; border:3px solid var(--bg2); font-size:26px; }
.nav-create:active { transform:scale(0.9); }

/* PAGES */
.page { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:16px; -webkit-overflow-scrolling:touch; }
.page::-webkit-scrollbar { display:none; }

/* ===== HOME ===== */
.home-tabs { display:flex; gap:8px; padding:4px 16px 16px; overflow-x:auto; scrollbar-width:none; }
.home-tabs::-webkit-scrollbar { display:none; }
.home-tab { flex-shrink:0; padding:8px 16px; border-radius:50px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; border:1px solid var(--border); color:var(--muted); background:var(--bg3); }
.home-tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border-color:transparent; }

.hero-banner { margin:12px 16px; padding:22px 20px; border-radius:22px; background:linear-gradient(135deg,#1a0a3a 0%,#0a1a3a 100%); border:1px solid rgba(124,58,237,0.25); position:relative; overflow:hidden; }
.hero-banner::after { content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; background:radial-gradient(circle,rgba(168,85,247,0.3) 0%,transparent 70%); pointer-events:none; }
.hero-tag { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--accent2); margin-bottom:8px; }
.hero-title { font-size:24px; font-weight:900; line-height:1.2; margin-bottom:6px; }
.hero-title em { font-style:normal; background:linear-gradient(135deg,#a855f7,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero-sub { font-size:13px; color:#9ca3af; margin-bottom:16px; line-height:1.5; }
.hero-actions { display:flex; gap:10px; }
.btn-primary { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,var(--accent),var(--cyan)); color:white; border:none; padding:11px 20px; border-radius:50px; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-primary:active { transform:scale(0.95); opacity:0.9; }
.btn-outline { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.05); color:var(--text); border:1px solid var(--border); padding:11px 16px; border-radius:50px; font-size:14px; font-weight:600; cursor:pointer; }

.section-hdr { display:flex; align-items:center; justify-content:space-between; padding:0 16px; margin-bottom:12px; }
.section-hdr h2 { font-size:17px; font-weight:800; display:flex; align-items:center; gap:6px; }
.section-hdr a { font-size:12px; color:var(--accent2); font-weight:600; cursor:pointer; }

/* FEED GRID - fixed images */
.feed-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px; }
.feed-card { border-radius:var(--radius); overflow:hidden; background:var(--bg3); border:1px solid var(--border); cursor:pointer; aspect-ratio:3/4; position:relative; transition:transform 0.15s; }
.feed-card:active { transform:scale(0.97); }
.feed-card img { width:100%; height:100%; object-fit:cover; display:block; }
.feed-card-label { position:absolute; bottom:0; left:0; right:0; padding:20px 10px 10px; background:linear-gradient(transparent,rgba(0,0,0,0.85)); }
.feed-card-label .tag { display:inline-block; background:rgba(124,58,237,0.8); color:white; font-size:9px; font-weight:800; padding:2px 7px; border-radius:5px; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.feed-card-label p { font-size:11px; color:#e5e7eb; font-weight:600; line-height:1.3; }
.feed-card-shimmer { width:100%; height:100%; }

/* ===== CREATE ===== */
.create-page { padding:16px; }
.create-hero { text-align:center; padding:20px 0 24px; }
.create-hero h2 { font-size:22px; font-weight:900; margin-bottom:6px; }
.create-hero p { font-size:13px; color:var(--muted); }

.style-scroll { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px; margin-bottom:20px; }
.style-scroll::-webkit-scrollbar { display:none; }
.style-chip { flex-shrink:0; padding:8px 14px; border-radius:50px; font-size:12px; font-weight:700; cursor:pointer; border:1px solid var(--border); background:var(--bg3); color:var(--muted); transition:all 0.2s; }
.style-chip.active { background:rgba(124,58,237,0.25); border-color:var(--accent2); color:var(--accent2); }

.prompt-box { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:12px; transition:border-color 0.2s; }
.prompt-box:focus-within { border-color:var(--accent2); }
.prompt-box textarea { width:100%; background:transparent; border:none; outline:none; color:var(--text); font-size:15px; line-height:1.6; resize:none; min-height:80px; font-family:inherit; }
.prompt-box textarea::placeholder { color:var(--muted); }
.prompt-actions { display:flex; gap:8px; align-items:center; justify-content:space-between; margin-top:10px; }
.prompt-actions-left { display:flex; gap:8px; }
.small-btn { padding:7px 13px; border-radius:50px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg2); color:var(--muted); display:flex; align-items:center; gap:4px; transition:all 0.2s; }
.small-btn:active { transform:scale(0.95); }
.small-btn.accent { border-color:rgba(168,85,247,0.4); color:var(--accent2); background:rgba(168,85,247,0.1); }

/* Image upload in create */
.img-upload-area { border:2px dashed var(--border); border-radius:var(--radius); padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:12px; background:var(--bg3); }
.img-upload-area:active, .img-upload-area.dragover { border-color:var(--accent2); background:rgba(124,58,237,0.08); }
.img-upload-area .upload-ico { font-size:36px; margin-bottom:8px; }
.img-upload-area p { font-size:13px; color:var(--muted); }
.img-upload-area .upload-hint { font-size:11px; color:var(--muted); margin-top:4px; opacity:0.7; }
.img-preview-wrap { position:relative; margin-bottom:12px; border-radius:var(--radius); overflow:hidden; }
.img-preview-wrap img { width:100%; max-height:240px; object-fit:cover; border-radius:var(--radius); display:block; }
.img-preview-wrap .remove-img { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); color:white; border:none; width:30px; height:30px; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

.size-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.size-btn { padding:10px 6px; border-radius:12px; border:1px solid var(--border); background:var(--bg3); cursor:pointer; text-align:center; transition:all 0.2s; }
.size-btn.active { border-color:var(--accent2); background:rgba(124,58,237,0.15); }
.size-btn .ratio { font-size:18px; margin-bottom:2px; }
.size-btn .label { font-size:10px; color:var(--muted); font-weight:600; }
.size-btn.active .label { color:var(--accent2); }

.gen-btn { width:100%; padding:16px; border-radius:50px; background:linear-gradient(135deg,var(--accent),var(--cyan)); color:white; font-size:16px; font-weight:800; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; letter-spacing:0.3px; box-shadow:0 4px 24px rgba(124,58,237,0.4); }
.gen-btn:active { transform:scale(0.97); }
.gen-btn:disabled { opacity:0.6; cursor:not-allowed; }

/* RESULT */
.result-wrap { margin-top:20px; animation:pop 0.4s ease; }
.result-img-wrap { border-radius:var(--radius); overflow:hidden; position:relative; margin-bottom:12px; }
.result-img-wrap img { width:100%; display:block; border-radius:var(--radius); }
.result-img-wrap .result-badge { position:absolute; top:10px; left:10px; background:rgba(16,185,129,0.9); color:white; font-size:10px; font-weight:800; padding:4px 10px; border-radius:20px; letter-spacing:0.5px; }
.result-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.result-act-btn { padding:12px; border-radius:14px; border:none; cursor:pointer; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.2s; }
.result-act-btn:active { transform:scale(0.96); }
.result-act-btn.save { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; }
.result-act-btn.download { background:var(--bg3); border:1px solid var(--border); color:var(--text); }
.result-act-btn.share { background:rgba(6,182,212,0.15); border:1px solid rgba(6,182,212,0.3); color:var(--cyan); }
.result-act-btn.remix { background:rgba(236,72,153,0.15); border:1px solid rgba(236,72,153,0.3); color:var(--pink); }

.generating-state { text-align:center; padding:40px 20px; }
.gen-spinner { width:56px; height:56px; border:4px solid var(--border); border-top-color:var(--accent2); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
.gen-status { font-size:15px; font-weight:600; color:var(--text); margin-bottom:6px; }
.gen-sub { font-size:12px; color:var(--muted); }
.gen-progress { width:100%; height:3px; background:var(--bg3); border-radius:2px; margin-top:16px; overflow:hidden; }
.gen-progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--cyan)); border-radius:2px; transition:width 0.3s; animation:pulse 2s infinite; }

/* ===== EFFECTS ===== */
.effects-page { padding:16px; }
.effects-upload { border:2px dashed var(--border); border-radius:var(--radius); padding:28px 20px; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--bg3); margin-bottom:16px; }
.effects-upload:active { border-color:var(--accent2); background:rgba(124,58,237,0.08); }
.effects-upload .up-ico { font-size:44px; margin-bottom:10px; }
.effects-upload h3 { font-size:16px; font-weight:700; margin-bottom:4px; }
.effects-upload p { font-size:13px; color:var(--muted); }

.effects-preview { position:relative; margin-bottom:16px; border-radius:var(--radius); overflow:hidden; }
.effects-preview .original-img { width:100%; max-height:260px; object-fit:cover; display:block; }
.effects-preview .change-img { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); color:white; border:none; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; }

.effects-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.effect-tile { border-radius:12px; overflow:hidden; aspect-ratio:1; position:relative; cursor:pointer; border:2px solid transparent; transition:all 0.2s; background:var(--bg3); }
.effect-tile.selected { border-color:var(--accent2); }
.effect-tile:active { transform:scale(0.95); }
.effect-tile .ef-preview { width:100%; height:100%; object-fit:cover; display:block; }
.effect-tile .ef-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.4); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.effect-tile .ef-ico { font-size:22px; }
.effect-tile .ef-name { font-size:9px; font-weight:700; color:white; text-align:center; }
.effect-tile.selected .ef-overlay { background:rgba(124,58,237,0.4); }
.apply-btn { width:100%; padding:14px; border-radius:50px; background:linear-gradient(135deg,#ec4899,#a855f7); color:white; font-size:15px; font-weight:800; border:none; cursor:pointer; transition:all 0.2s; }
.apply-btn:active { transform:scale(0.97); }
.apply-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* ===== EXPLORE ===== */
.explore-page { padding:16px; }
.explore-search { display:flex; gap:10px; margin-bottom:16px; }
.search-input-wrap { flex:1; display:flex; align-items:center; gap:10px; background:var(--bg3); border:1px solid var(--border); border-radius:50px; padding:0 16px; }
.search-input-wrap input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:14px; height:44px; }
.search-input-wrap input::placeholder { color:var(--muted); }
.search-btn { padding:0 20px; height:44px; border-radius:50px; background:linear-gradient(135deg,var(--accent),var(--cyan)); color:white; border:none; font-size:14px; font-weight:700; cursor:pointer; }

.category-tabs { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; margin-bottom:16px; }
.category-tabs::-webkit-scrollbar { display:none; }
.cat-tab { flex-shrink:0; padding:8px 16px; border-radius:50px; font-size:12px; font-weight:700; cursor:pointer; border:1px solid var(--border); background:var(--bg3); color:var(--muted); transition:all 0.2s; display:flex; align-items:center; gap:5px; }
.cat-tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border-color:transparent; }

.explore-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.explore-card { border-radius:14px; overflow:hidden; aspect-ratio:1; position:relative; cursor:pointer; background:var(--bg3); transition:transform 0.15s; }
.explore-card:active { transform:scale(0.96); }
.explore-card img { width:100%; height:100%; object-fit:cover; display:block; }
.explore-card .exp-overlay { position:absolute; bottom:0; left:0; right:0; padding:16px 8px 8px; background:linear-gradient(transparent,rgba(0,0,0,0.8)); }
.explore-card .exp-label { font-size:11px; font-weight:700; color:white; }

/* ===== GALLERY ===== */
.gallery-page { padding:16px; }
.gallery-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.gallery-hdr h2 { font-size:20px; font-weight:900; }
.clear-btn { padding:7px 14px; border-radius:50px; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); color:#f87171; font-size:12px; font-weight:600; cursor:pointer; }
.gallery-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.gallery-item { border-radius:10px; overflow:hidden; aspect-ratio:1; position:relative; cursor:pointer; background:var(--bg3); }
.gallery-item img { width:100%; height:100%; object-fit:cover; display:block; }
.gallery-item .g-del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.65); color:white; border:none; width:24px; height:24px; border-radius:50%; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.gallery-item .g-label { position:absolute; bottom:0; left:0; right:0; padding:10px 5px 5px; background:linear-gradient(transparent,rgba(0,0,0,0.75)); font-size:9px; color:#e5e7eb; font-weight:600; }
.gallery-empty { text-align:center; padding:60px 20px; }
.gallery-empty .empty-ico { font-size:60px; margin-bottom:16px; }
.gallery-empty h3 { font-size:18px; font-weight:700; margin-bottom:6px; }
.gallery-empty p { font-size:13px; color:var(--muted); }

/* ===== PROFILE ===== */
.profile-page { padding:16px; }
.profile-hero { text-align:center; padding:24px 0 20px; }
.profile-avatar { width:80px; height:80px; border-radius:50%; margin:0 auto 12px; background:linear-gradient(135deg,var(--accent),var(--cyan)); display:flex; align-items:center; justify-content:center; font-size:36px; border:3px solid rgba(168,85,247,0.3); }
.profile-name { font-size:20px; font-weight:800; margin-bottom:4px; }
.profile-sub { font-size:13px; color:var(--muted); margin-bottom:16px; }
.profile-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; text-align:center; }
.stat-num { font-size:24px; font-weight:900; background:linear-gradient(135deg,var(--accent2),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.stat-label { font-size:11px; color:var(--muted); font-weight:600; margin-top:2px; }
.settings-list { display:flex; flex-direction:column; gap:8px; }
.setting-row { display:flex; align-items:center; justify-content:space-between; background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:14px 16px; cursor:pointer; }
.setting-row-left { display:flex; align-items:center; gap:12px; }
.setting-ico { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.setting-label { font-size:14px; font-weight:600; }
.setting-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.setting-arrow { color:var(--muted); font-size:18px; }

/* LIGHTBOX */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:200; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.lightbox.open { display:flex; animation:fadeIn 0.2s ease; }
.lightbox img { max-width:100%; max-height:75vh; border-radius:16px; object-fit:contain; }
.lb-actions { display:flex; gap:10px; margin-top:16px; }
.lb-btn { padding:11px 22px; border-radius:50px; font-size:14px; font-weight:700; cursor:pointer; border:none; display:flex; align-items:center; gap:6px; transition:all 0.2s; }
.lb-btn.primary { background:linear-gradient(135deg,var(--accent),var(--cyan)); color:white; }
.lb-btn.secondary { background:var(--bg3); border:1px solid var(--border); color:var(--text); }
.lb-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,0.1); border:none; color:white; width:40px; height:40px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* TOAST */
.toast-wrap { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; pointer-events:none; width:calc(100% - 32px); max-width:340px; }
.toast { padding:13px 18px; border-radius:50px; font-size:13px; font-weight:700; text-align:center; animation:pop 0.3s ease; pointer-events:auto; color:white; }
.toast.success { background:linear-gradient(135deg,#059669,#10b981); }
.toast.error { background:linear-gradient(135deg,#dc2626,#ef4444); }
.toast.info { background:linear-gradient(135deg,var(--accent),var(--accent2)); }
.toast.out { animation:fadeIn 0.2s ease reverse; }

/* VOICE AI */
.voice-page { padding:16px; }
.voice-hero { text-align:center; padding:20px 0 24px; }
.voice-hero h2 { font-size:22px; font-weight:900; margin-bottom:6px; }

function pUrl(prompt, w, h, seed) {
  const enc = encodeURIComponent(prompt.trim().substring(0,200));
  const s = seed || Math.floor(Math.random()*99999);
  return `https://image.pollinations.ai/prompt/${enc}?width=${w}&height=${h}&seed=${s}&nologo=true&model=flux`;
}

// ==================== GALLERY ====================
function saveGallery() {
  try { localStorage.setItem('lumina_gallery', JSON.stringify(gallery)); } catch(e) {}
}
function addToGallery(url, prompt, style) {
  gallery.push({ url, prompt: (prompt||'').substring(0,80), style: style||'AI', ts: Date.now() });
  if (gallery.length > 100) gallery = gallery.slice(-100);
  saveGallery();
  toast('Saved to Gallery! 🖼', 'success');
}
function deleteGallery(idx) {
  gallery.splice(idx, 1);
  saveGallery();
  renderPage();
  toast('Deleted', 'info');
}
function clearGallery() {
  if (!confirm('Clear all saved images?')) return;
  gallery = [];
  saveGallery();
  renderPage();
  toast('Gallery cleared', 'info');
}

// ==================== TOAST ====================
function toast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 2800);
}

// ==================== LIGHTBOX ====================
function openLightbox(url) {
  lightboxUrl = url;
  document.getElementById('lb-img').src = url;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function downloadLightboxImg() {
  downloadImage(lightboxUrl);
}
function saveToGalleryFromLb() {
  addToGallery(lightboxUrl, 'Saved from lightbox', 'Saved');
}
function downloadImage(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'lumina-ai-' + Date.now() + '.jpg';
  a.target = '_blank';
  a.click();
  toast('Downloading image... ⬇', 'info');
}

// ==================== NAV ====================
function setPage(page) {
  currentPage = page;
  ['home','explore','create','gallery','profile'].forEach(p => {
    const el = document.getElementById(`nav-${p}`);
    if (el) el.classList.toggle('active', p === page);
  });
  renderPage();
  document.getElementById('page-container').scrollTop = 0;
}

function renderPage() {
  const c = document.getElementById('page-container');
  if (currentPage === 'home') renderHome(c);
  else if (currentPage === 'explore') renderExplore(c);
  else if (currentPage === 'create') renderCreate(c);
  else if (currentPage === 'gallery') renderGallery(c);
  else if (currentPage === 'profile') renderProfile(c);
}

function switchMode(mode) {
  createMode = mode;
  renderPage();
}

function handleCreateImgUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    uploadedImage = e.target.result;
    const area = document.getElementById('upload-area');
    area.innerHTML = `
      <div class="img-preview-wrap" style="margin:0">
        <img src="${uploadedImage}" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;display:block;">
        <button class="remove-img" onclick="event.stopPropagation();removeUploadedImg()">✕</button>
      </div>`;
    toast('Image uploaded! ✓', 'success');
  };
  reader.readAsDataURL(file);
}

function removeUploadedImg() {
  uploadedImage = null;
  const area = document.getElementById('upload-area');
  area.innerHTML = `
    <div id="upload-content">
      <div class="upload-ico">📷</div>
      <p>Tap to upload a reference image</p>
      <p class="upload-hint">JPG, PNG, WEBP supported</p>
    </div>`;
}

function selectStyle(id) {
  selectedStyle = id;
  document.querySelectorAll('.style-chip').forEach(el => {
    const s = STYLES.find(s=>s.id===el.dataset.id||el.textContent.includes(STYLES.find(x=>x.id===id)?.icon));
    el.classList.toggle('active', el.onclick?.toString().includes(`'${id}'`));
  });
  renderPage();
}

function selectSize(id, w, h) {
  selectedSize = {id,w,h};
  renderPage();
}

async function enhancePrompt() {
  const ta = document.getElementById('create-prompt');
  const prompt = ta.value.trim();
  if (!prompt) { toast('Type a prompt first!', 'error'); return; }
  toast('✨ Enhancing your prompt...', 'info');
  try {
    const url = `https://text.pollinations.ai/${encodeURIComponent('Enhance this image prompt to be more detailed and creative (return ONLY the enhanced prompt, max 180 chars): ' + prompt)}`;
    const res = await fetch(url);
    const text = await res.text();
    if (text && text.length > 5) {
      ta.value = text.trim().substring(0,400);
      document.getElementById('char-count').textContent = ta.value.length + '/400';
      toast('Prompt enhanced! 🪄', 'success');
    }
  } catch(e) { toast('Could not enhance, try again', 'error'); }
}

function generateImage() {
  const ta = document.getElementById('create-prompt');
  const prompt = ta.value.trim();
  if (!prompt) { toast('Please describe your image!', 'error'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Generating...';
  genRetries = 0;

  const styleObj = STYLES.find(s=>s.id===selectedStyle) || STYLES[0];
  const fullPrompt = selectedStyle !== 'none' ? `${prompt}, ${styleObj.name} style, highly detailed, masterpiece` : `${prompt}, highly detailed, masterpiece`;
  const seed = Math.floor(Math.random()*99999);
  const url = pUrl(fullPrompt, selectedSize.w, selectedSize.h, seed);

  const resultArea = document.getElementById('result-area');
  let progress = 0;
  resultArea.innerHTML = `
    <div class="generating-state">
      <div class="gen-spinner"></div>
      <div class="gen-status" id="gen-status">Creating your artwork...</div>
      <div class="gen-sub" id="gen-sub">This takes 10–20 seconds. Hang tight! ☕</div>
      <div class="gen-progress"><div class="gen-progress-bar" id="gen-bar" style="width:5%"></div></div>
    </div>`;
  resultArea.scrollIntoView({behavior:'smooth',block:'start'});

  const interval = setInterval(() => {
    progress = Math.min(progress + 3, 90);
    const bar = document.getElementById('gen-bar');
    const status = document.getElementById('gen-status');
    const sub = document.getElementById('gen-sub');
    if (bar) bar.style.width = progress + '%';
    if (progress > 40 && status) status.textContent = 'Adding details...';
    if (progress > 70 && status) status.textContent = 'Almost done...';
    if (progress > 50 && sub) sub.textContent = 'Almost there! 🎨';
  }, 600);

  const img = new Image();
  img.crossOrigin = 'anonymous';

  const tryLoad = (attempt) => {
    img.src = url + `&_a=${attempt}&t=${Date.now()}`;
  };

  img.onload = () => {
    clearInterval(interval);
    addToGallery(url, prompt, styleObj.name);
    resultArea.innerHTML = `
      <div class="result-wrap">
        <div class="result-img-wrap">
          <img src="${img.src}" alt="${prompt}" onclick="openLightbox('${img.src}')">
          <span class="result-badge">✓ Generated</span>
        </div>
        <div class="result-actions">
          <button class="result-act-btn save" onclick="addToGallery('${url}','${prompt.replace(/'/g,"\\'")}','${styleObj.name}')">🖼 Gallery</button>
          <button class="result-act-btn download" onclick="downloadImage('${img.src}')">⬇ Save</button>
          <button class="result-act-btn share" onclick="shareImage('${img.src}','${prompt.replace(/'/g,"\\'")}')">📤 Share</button>
          <button class="result-act-btn remix" onclick="document.getElementById('create-prompt').value='${prompt.replace(/'/g,"\\'")}';window.scrollTo(0,0)">🔄 Remix</button>
        </div>
        <div style="margin-top:12px;padding:12px;background:var(--bg3);border-radius:14px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Prompt Used</div>
          <div style="font-size:13px;color:var(--text);line-height:1.5">${prompt}</div>
        </div>
      </div>`;
    btn.disabled = false;
    btn.innerHTML = '✨ Generate Again';
    toast('Image created! 🎉', 'success');
  };

  img.onerror = () => {
    if (genRetries < 2) {
      genRetries++;
      const status = document.getElementById('gen-status');
      const sub = document.getElementById('gen-sub');
      if (status) status.textContent = `Retrying... (attempt ${genRetries+1}/3)`;
      if (sub) sub.textContent = 'Slow connection? Hang on...';
      setTimeout(() => tryLoad(genRetries), 5000);
    } else {
      clearInterval(interval);
      resultArea.innerHTML = `
        <div style="text-align:center;padding:30px 20px;background:var(--bg3);border-radius:var(--radius);margin-top:16px;border:1px solid var(--border);">
          <div style="font-size:40px;margin-bottom:12px">⚠️</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:6px">Generation Failed</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Check your internet connection and try again</div>
          <button class="btn-primary" onclick="generateImage()">🔄 Try Again</button>
          <div style="margin-top:12px">
            <a href="${url}" target="_blank" style="font-size:12px;color:var(--accent2);">Open directly in browser →</a>
          </div>
        </div>`;
      btn.disabled = false;
      btn.innerHTML = '✨ Generate Image';
    }
  };

  tryLoad(0);
}

function shareImage(url, prompt) {
  if (navigator.share) {
    navigator.share({ title: 'LuminaAI Creation', text: prompt, url: url })
      .then(() => toast('Shared! 🚀', 'success'))
      .catch(() => toast('Share cancelled', 'info'));
  } else {
    navigator.clipboard?.writeText(url).then(() => toast('Image URL copied! 📋', 'success'));
  }
}

  c.innerHTML = `

      </div>

      ${effectsImage ? `
        <div class="effects-preview">
          <canvas id="effects-canvas" style="width:100%;border-radius:var(--radius);display:block"></canvas>
          <button class="change-img" onclick="changeEffectsImg()">📷 Change</button>
        </div>
        <input type="file" id="eff-input" accept="image/*" style="display:none" onchange="handleEffectsUpload(this)">
      ` : `
        <div class="effects-upload" onclick="document.getElementById('eff-input').click()">
          <div class="up-ico">📷</div>
          <h3>Upload Your Photo</h3>
          <p>Tap to select a photo from your gallery</p>
          <div style="margin-top:12px;padding:8px 16px;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);border-radius:50px;display:inline-block;font-size:13px;color:var(--accent2);font-weight:600">📁 Browse Photos</div>
        </div>
        <input type="file" id="eff-input" accept="image/*" style="display:none" onchange="handleEffectsUpload(this)">
      `}

      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;">Choose Effect</div>
      <div class="effects-grid">
        ${EFFECTS.map(e=>`
          <div class="effect-tile ${selectedEffect===e.id?'selected':''}" onclick="selectEffect('${e.id}')">
            ${effectsImage ? `<img class="ef-preview" src="${effectsImage}" style="filter:${e.filter}" alt="${e.name}">` : `<div style="width:100%;height:100%;background:var(--bg2)"></div>`}
            <div class="ef-overlay">
              <span class="ef-ico">${e.icon}</span>
              <span class="ef-name">${e.name}</span>
            </div>
          </div>
        `).join('')}
      </div>

      <button class="apply-btn" id="apply-btn" ${!effectsImage?'disabled':''} onclick="applyEffect()">
        ${!effectsImage ? '📷 Upload photo first' : '✨ Apply & Save Effect'}
      </button>
    </div>
  `;
  if (effectsImage) drawCanvas();
}

function handleEffectsUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    effectsImage = e.target.result;
    renderPage();
    toast('Photo uploaded! Pick an effect ✨', 'success');
  };
  reader.readAsDataURL(file);
}

function changeEffectsImg() {
  document.getElementById('eff-input').click();
}

function selectEffect(id) {
  selectedEffect = id;
  renderPage();
}

function drawCanvas() {
  const canvas = document.getElementById('effects-canvas');
  if (!canvas || !effectsImage) return;
  const ef = EFFECTS.find(e=>e.id===selectedEffect) || EFFECTS[0];
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.filter = ef.filter || 'none';
    ctx.drawImage(img, 0, 0);
  };
  img.src = effectsImage;
}

function applyEffect() {
  if (!effectsImage) { toast('Upload a photo first!', 'error'); return; }
  const canvas = document.getElementById('effects-canvas');
  const ef = EFFECTS.find(e=>e.id===selectedEffect) || EFFECTS[0];
  if (!canvas) { toast('Error applying effect', 'error'); return; }
  const img2 = new Image();
  img2.onload = () => {
    canvas.width = img2.width;
    canvas.height = img2.height;
    const ctx = canvas.getContext('2d');
    ctx.filter = ef.filter || 'none';
    ctx.drawImage(img2, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    addToGallery(dataUrl, `${ef.name} effect applied`, 'Effect');
    toast(`${ef.name} effect saved! 🎨`, 'success');
  };
  img2.src = effectsImage;
}

      </div>

        <div class="voice-ctrl">
          <label>⚡ Speed: <span id="rate-val">${voiceRate}x</span></label>

      </button>

      <div style="margin-top:16px;padding:14px;background:var(--bg3);border-radius:14px;border:1px solid var(--border);">
        <div style="font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Quick Phrases</div>

          ${['Hello World!','Welcome to LuminaAI!','AI art is amazing!','Create something beautiful today','The future is now'].map(p=>`
            <div onclick="document.getElementById('voice-text').value='${p}'" style="padding:7px 12px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.2);border-radius:50px;font-size:12px;color:var(--accent2);cursor:pointer;font-weight:600">${p}</div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

let voiceText = '';
function selectLang(code) { selectedLang = code; renderPage(); }
function toggleSpeak() {
  voiceText = document.getElementById('voice-text')?.value?.trim() || '';
  if (!voiceText) { toast('Type some text first!', 'error'); return; }
  if (isSpeaking) {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    const btn = document.getElementById('speak-btn');
    if (btn) { btn.textContent = '▶ Speak Now'; btn.classList.remove('speaking'); }
    return;
  }
  if (!window.speechSynthesis) { toast('Voice not supported in this browser', 'error'); return; }
  const utt = new SpeechSynthesisUtterance(voiceText);
  utt.lang = selectedLang;
  utt.rate = voiceRate;
  utt.pitch = voicePitch;
  utt.onstart = () => {
    isSpeaking = true;
    const btn = document.getElementById('speak-btn');
    if (btn) { btn.textContent = '⏹ Stop Speaking'; btn.classList.add('speaking'); }
    toast('Speaking... 🗣', 'info');
  };
  utt.onend = () => {
    isSpeaking = false;
    const btn = document.getElementById('speak-btn');
    if (btn) { btn.textContent = '▶ Speak Now'; btn.classList.remove('speaking'); }
  };
  utt.onerror = () => { isSpeaking = false; toast('Voice error. Try again.', 'error'); };
  window.speechSynthesis.speak(utt);
}

function renderExplore(c) {
  c.innerHTML = `
    <div class="explore-page">
      <div class="explore-search">
        <div class="search-input-wrap">
          <span style="font-size:16px">🔍</span>
          <input type="text" id="explore-q" placeholder="Search art styles, themes..." onkeydown="if(event.key==='Enter')doSearch()">
        </div>
        <button class="search-btn" onclick="doSearch()">Go</button>

        ${EXPLORE_CATS.map(c=>`<div class="cat-tab ${exploreCat===c.name?'active':''}" onclick="setExploreCat('${c.name}')">${c.emoji} ${c.name}</div>`).join('')}
      </div>

      <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:700">${exploreCat} Art</span>
        <span style="font-size:12px;color:var(--muted)">Real AI Generated</span>
      </div>

      <div class="explore-grid" id="explore-grid"></div>
    </div>
  `;
  loadExploreImages();

function setExploreCat(cat) {
  exploreCat = cat;
  renderPage();
}

function doSearch() {
  const q = document.getElementById('explore-q')?.value?.trim();
  if (!q) return;
  const grid = document.getElementById('explore-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const prompts = [
    `${q} digital art detailed`,
    `${q} fantasy illustration`,
    `${q} photorealistic render`,
    `${q} anime art style`,
  ];
  prompts.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'explore-card';
    card.innerHTML = `<div class="shimmer" style="width:100%;height:100%"></div>`;
    const url = pUrl(p, 512, 512, 8000+i+Math.floor(Math.random()*1000));
    card.onclick = () => openLightbox(url);
    grid.appendChild(card);
    const img = new Image();
    let retries = 0;
    const load = () => { img.src = url + `&_r=${retries}`; };
    img.onload = () => {
      card.innerHTML = `<img src="${img.src}" alt="${q}"><div class="exp-overlay"><span class="exp-label">${q}</span></div>`;
    };
    img.onerror = () => {
      if (retries < 1) { retries++; setTimeout(load, 5000); }
      else card.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px">🎨</div>`;
    };
    load();
  });
  toast(`Searching: ${q} 🔍`, 'info');
}

function loadExploreImages() {
  const grid = document.getElementById('explore-grid');
  if (!grid) return;
  const items = EXPLORE_ITEMS.filter(i=>i.cat===exploreCat);
  const extra = items.length < 6 ? EXPLORE_ITEMS.slice(0,4) : [];
  const all = [...items, ...extra].slice(0,8);
  all.forEach((item, i) => {
    const seed = 3000 + EXPLORE_CATS.findIndex(c=>c.name===exploreCat)*100 + i;
    const url = pUrl(item.p, 512, 512, seed);
    const card = document.createElement('div');
    card.className = 'explore-card';
    card.innerHTML = `<div class="shimmer" style="width:100%;height:100%"></div>`;
    card.onclick = () => openLightbox(url);
    grid.appendChild(card);
    const img = new Image();
    let retries = 0;
    const load = () => { img.src = url + `&_r=${retries}`; };
    img.onload = () => {
      card.innerHTML = `<img src="${img.src}" alt="${item.label}"><div class="exp-overlay"><span class="exp-label">${item.label}</span></div>`;
    };
    img.onerror = () => {
      if (retries < 1) { retries++; setTimeout(load, 5000); }
      else card.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;gap:4px;flex-direction:column;"><div style="font-size:24px">🎨</div><div style="font-size:9px;color:var(--muted);text-align:center;padding:4px">${item.label}</div></div>`;
    };
    load();
  });
}

// Override setPage to handle effects and voice
const _setPage = setPage;
window.setPage = function(page) {
  currentPage = page;
  ['home','explore','create','gallery','profile'].forEach(p => {
    const el = document.getElementById(`nav-${p}`);
    if (el) el.classList.toggle('active', p === page);
  });
  const c = document.getElementById('page-container');
  if (page === 'effects') { renderEffects(c); }
  else if (page === 'voice') { renderVoice(c); }
  else { renderPage(); }
  document.getElementById('page-container').scrollTop = 0;
};
